<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOXGRAB • Premium Blox Fruits Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Press Start 2P', sans-serif; }

        .hero-bg {
            background: linear-gradient(45deg, #1a0033, #330066, #000000);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .card-hover:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 0 40px -10px rgb(255 0 170);
        }

        .category-btn {
            transition: all 0.3s ease;
        }
        
        .category-btn.active {
            background-color: #ff00aa;
            color: white;
            border-color: #ff00aa;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- Navbar (same as before) -->
    <nav class="bg-black/90 backdrop-blur-lg border-b border-pink-500/30 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-purple-600 rounded-xl flex items-center justify-center text-2xl">🍎</div>
                <span class="logo-font text-3xl tracking-tighter">BLOX<span class="text-pink-500">GRAB</span></span>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="navigateTo('home')" class="hover:text-pink-400">HOME</a>
                <a href="#" onclick="navigateTo('shop')" class="hover:text-pink-400">SHOP</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section (same) -->
    <section id="home" class="hero-bg pt-24 pb-20 min-h-screen flex items-center">
        <div class="max-w-7xl mx-auto px-6 text-center md:text-left">
            <h1 class="text-6xl md:text-7xl font-bold leading-none">BUY PREMIUM<br><span class="text-pink-500">BLOX FRUITS</span> ACCOUNTS</h1>
            <button onclick="navigateTo('shop')" class="mt-10 px-10 py-4 bg-pink-600 hover:bg-pink-500 rounded-2xl text-lg font-semibold">
                SHOP NOW →
            </button>
        </div>
    </section>

    <!-- Shop Section -->
    <section id="shop" class="py-20 bg-black">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-bold mb-8">Featured Accounts</h2>

            <!-- Toggleable Category Buttons -->
            <div class="flex gap-3 mb-10">
                <button onclick="filterCategory('all', this)" 
                        class="category-btn active px-8 py-3 rounded-2xl border border-white/20 text-sm font-medium">ALL</button>
                <button onclick="filterCategory('max', this)" 
                        class="category-btn px-8 py-3 rounded-2xl border border-white/20 text-sm font-medium">MAXED</button>
                <button onclick="filterCategory('fruit', this)" 
                        class="category-btn px-8 py-3 rounded-2xl border border-white/20 text-sm font-medium">BEST FRUITS</button>
            </div>

            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
                <!-- JS will fill this -->
            </div>
        </div>
    </section>

    <script>
        const accounts = [ /* same data as before */ 
            { id:1, title:"Max Level 2450 • Dragon + Leopard", price:129.99, level:2450, image:"https://picsum.photos/id/1015/400/300", category:"max" },
            { id:2, title:"God Human + 6 Fruits • Level 1890", price:74.50, level:1890, image:"https://picsum.photos/id/201/400/300", category:"fruit" },
            { id:3, title:"Fresh Venom Account • Level 420", price:24.99, level:420, image:"https://picsum.photos/id/301/400/300", category:"fruit" },
            { id:4, title:"Ultimate Maxed • All Awakened", price:199.00, level:2670, image:"https://picsum.photos/id/401/400/300", category:"max" }
        ];

        function populateProducts(filtered = accounts) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            filtered.forEach(acc => {
                const div = document.createElement('div');
                div.className = "bg-zinc-900 rounded-3xl overflow-hidden card-hover cursor-pointer";
                div.innerHTML = `
                    <img src="${acc.image}" class="w-full h-52 object-cover">
                    <div class="p-5">
                        <h3 class="font-semibold text-lg">${acc.title}</h3>
                        <p class="text-pink-400 text-2xl font-bold mt-2">$${acc.price}</p>
                        <button onclick="event.stopImmediatePropagation(); addToCart(${acc.id});" 
                                class="mt-4 w-full py-3 bg-white text-black rounded-2xl font-medium">
                            Add to Cart
                        </button>
                    </div>
                `;
                div.onclick = () => alert(`Viewing: ${acc.title}`);
                grid.appendChild(div);
            });
        }

        // Toggleable Category Filter
        function filterCategory(category, button) {
            // Remove active from all buttons
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Add active to clicked button
            button.classList.add('active');

            // Filter products
            if (category === 'all') {
                populateProducts(accounts);
            } else {
                const filtered = accounts.filter(a => a.category === category);
                populateProducts(filtered);
            }
        }

        function addToCart(id) {
            alert("✅ Account added to cart!");
        }

        function navigateTo(page) {
            document.getElementById(page).scrollIntoView({ behavior: "smooth" });
        }

        // Initialize
        window.onload = () => {
            populateProducts();
        };
    </script>
</body>
</html>
