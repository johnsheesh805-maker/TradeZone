<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeZone - Blox Fruits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Press Start 2P', sans-serif; }

        .hero-bg { background: linear-gradient(135deg, #1a0022, #2a0044); }
        
        .product-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px -15px rgb(236 72 153);
        }

        .toast { animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { transform: translateX(150%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- NAVBAR -->
    <nav class="bg-black/95 backdrop-blur-lg border-b border-pink-500/30 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🔄</span>
                <span class="logo-font text-4xl tracking-tighter">TRADE</span>
                <span class="logo-font text-4xl tracking-tighter text-pink-500">ZONE</span>
            </div>
            <div onclick="toggleCart()" class="relative cursor-pointer">
                <i class="fa-solid fa-cart-shopping text-3xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-pink-500 text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">0</span>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-bg pt-28 pb-16 text-center">
        <h1 class="text-6xl font-bold">TRADEZONE</h1>
        <p class="text-pink-300">Premium Blox Fruits Accounts & Fruits</p>
    </section>

    <!-- ACCOUNTS -->
    <section class="py-16 bg-black">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-bold text-center mb-12">Accounts</h2>
            <div id="accounts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- FRUITS -->
    <section class="py-16 bg-zinc-900">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-bold text-center mb-12 text-purple-400">Fruits</h2>
            <div id="fruits-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </section>

    <!-- CART -->
    <div id="cart-sidebar" class="hidden fixed top-0 right-0 h-full w-full md:w-96 bg-zinc-900 border-l border-pink-500 z-[100]">
        <div class="p-6">
            <div class="flex justify-between mb-8">
                <h3 class="text-3xl font-bold">Cart</h3>
                <button onclick="toggleCart()" class="text-4xl">×</button>
            </div>
            <div id="cart-items" class="space-y-4"></div>
            <div class="mt-10 pt-6 border-t border-zinc-700">
                <div class="flex justify-between text-2xl font-bold mb-6">
                    <span>Total</span>
                    <span id="cart-total" class="text-pink-400">$0.00</span>
                </div>
                <button onclick="proceedToPayment()" class="w-full py-6 bg-pink-600 rounded-3xl text-xl font-semibold">ORDER NOW</button>
            </div>
        </div>
    </div>

    <!-- PAYMENT MODAL -->
    <div id="payment-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center">
        <div class="max-w-md w-full mx-4 bg-zinc-900 rounded-3xl p-10">
            <h2 class="text-3xl font-bold text-center mb-8">Complete Payment</h2>
            
            <div class="bg-black/60 rounded-2xl p-8 text-center mb-8">
                <p class="text-pink-400">GCash Number</p>
                <p class="text-5xl font-mono font-bold text-green-400 mt-2">0985 4800 266</p>
            </div>

            <button onclick="completePayment()" class="w-full py-7 bg-green-500 hover:bg-green-600 rounded-3xl text-2xl font-bold">
                ✅ I HAVE PAID
            </button>
        </div>
    </div>

    <!-- RECEIPT + DETAILS MODAL -->
    <div id="receipt-modal" class="hidden fixed inset-0 bg-black/95 z-[300] flex items-center justify-center">
        <div class="max-w-lg w-full mx-4 bg-zinc-900 rounded-3xl p-10">
            <div class="text-center mb-6">
                <h2 class="text-4xl font-bold text-green-400">✅ Payment Received</h2>
            </div>

            <div id="receipt-content" class="bg-zinc-800 rounded-2xl p-6 mb-8"></div>

            <!-- Username Input (for Fruits) -->
            <div id="username-section" class="hidden mb-8">
                <label class="block text-sm text-zinc-400 mb-2">Roblox Username (Required for Fruits)</label>
                <input id="roblox-username" type="text" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-pink-500"
                       placeholder="Enter your Roblox username">
            </div>

            <!-- Receipt Upload -->
            <div class="mb-8">
                <label class="block text-sm text-zinc-400 mb-3">Upload Receipt Screenshot</label>
                <input type="file" id="receipt-upload" accept="image/*" 
                       class="w-full bg-zinc-800 border border-dashed border-zinc-600 rounded-2xl px-5 py-10 text-center cursor-pointer">
            </div>

            <button onclick="submitOrder()" 
                    class="w-full py-6 bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl text-xl font-bold">
                SUBMIT & SEND TO TRADEZONE
            </button>
        </div>
    </div>

    <!-- CUSTOM TOAST -->
    <div id="toast" class="hidden fixed bottom-6 right-6 bg-zinc-800 border border-pink-500 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 toast">
        <span id="toast-text" class="font-medium"></span>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1443622923368923146/6jrcif-n9j3tKOoSoIcziyEffSdijfg_vLHwNjy7CCyiBkVyYIvkBmBhn1d8m-sPFQp8";

        const accounts = [
            { id:1, title:"2800 Max Level Account", desc:"6+ Random Fruits • Random Fighting Style", price:0.50, image:"https://picsum.photos/id/1015/600/380" },
            { id:2, title:"2650 Max Level Account", desc:"8+ Random Fruits • God Human", price:0.65, image:"https://picsum.photos/id/201/600/380" },
            { id:3, title:"2400 High Level Account", desc:"5+ Random Fruits • Awakened", price:0.45, image:"https://picsum.photos/id/301/600/380" }
        ];

        const fruits = [
            {name:"Yeti", price:0.35, emoji:"❄️"}, {name:"Kitsune", price:2.00, emoji:"🦊"},
            {name:"Leopard", price:0.35, emoji:"🐆"}, {name:"Gas", price:0.30, emoji:"☁️"},
            {name:"Spirit", price:0.20, emoji:"👻"}, {name:"Dough", price:0.30, emoji:"🍩"},
            {name:"T-Rex", price:0.25, emoji:"🦖"}, {name:"Venom", price:0.30, emoji:"☠️"}
        ];

        let cart = [];

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerHTML = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2800);
        }

        function populateAccounts() {
            const grid = document.getElementById('accounts-grid');
            grid.innerHTML = '';
            accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = "product-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer";
                card.innerHTML = `
                    <img src="${acc.image}" class="w-full h-56 object-cover">
                    <div class="p-6">
                        <h3 class="font-bold text-xl">${acc.title}</h3>
                        <p class="text-zinc-400 text-sm mt-2">${acc.desc}</p>
                        <div class="flex justify-between items-center mt-6">
                            <span class="text-4xl font-bold text-pink-400">\[ {acc.price}</span>
                            <button onclick="event.stopImmediatePropagation(); addToCart(${acc.id}, 'account')" 
                                    class="bg-white hover:bg-zinc-200 text-black px-7 py-3 rounded-2xl font-medium">Add</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function populateFruits() {
            const grid = document.getElementById('fruits-grid');
            grid.innerHTML = '';
            fruits.forEach((fruit, i) => {
                const div = document.createElement('div');
                div.className = "bg-zinc-800 hover:bg-violet-900 p-6 rounded-3xl text-center cursor-pointer transition-all";
                div.innerHTML = `
                    <div class="text-5xl mb-3">${fruit.emoji}</div>
                    <h4 class="font-bold">${fruit.name}</h4>
                    <p class="text-pink-400 text-2xl font-bold"> \]{fruit.price}</p>
                `;
                div.onclick = () => addToCart(i, 'fruit');
                grid.appendChild(div);
            });
        }

        function addToCart(id, type) {
            let item = type === 'account' ? accounts.find(a => a.id === id) : {...fruits[id], title: fruits[id].name + " Fruit"};
            cart.push(item);
            document.getElementById('cart-count').textContent = cart.length;
            showToast(`✅ <b>${item.title || item.name}</b> added!`);
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('hidden');
            if (!sidebar.classList.contains('hidden')) renderCart();
        }

        function renderCart() {
            let html = '', total = 0;
            cart.forEach(item => {
                total += item.price;
                html += `<div class="flex justify-between bg-zinc-800 p-4 rounded-2xl"><span>${item.title || item.name}</span><span>\[ {item.price}</span></div>`;
            });
            document.getElementById('cart-items').innerHTML = html || `<p class="text-center py-12 text-zinc-400">Cart empty</p>`;
            document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
        }

        function proceedToPayment() {
            if (cart.length === 0) return showToast("Cart is empty!");
            document.getElementById('cart-sidebar').classList.add('hidden');
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function completePayment() {
            document.getElementById('payment-modal').classList.add('hidden');
            showReceiptModal();
        }

        function showReceiptModal() {
            const hasFruit = cart.some(item => item.title && item.title.includes("Fruit"));
            document.getElementById('username-section').classList.toggle('hidden', !hasFruit);

            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let itemsHtml = cart.map(item => `
                <div class="flex justify-between py-2">
                    <span>${item.title || item.name}</span>
                    <span class="font-bold"> \]{item.price}</span>
                </div>
            `).join('');

            document.getElementById('receipt-content').innerHTML = `
                ${itemsHtml}
                <div class="border-t border-pink-500 mt-6 pt-4 flex justify-between text-xl font-bold">
                    <span>Total</span><span class="text-pink-400">\[ {total.toFixed(2)}</span>
                </div>
            `;
            document.getElementById('receipt-modal').classList.remove('hidden');
        }

        async function submitOrder() {
            const username = document.getElementById('roblox-username').value.trim();
            const hasFruit = cart.some(item => item.title && item.title.includes("Fruit"));

            if (hasFruit && !username) {
                return showToast("❌ Please enter Roblox username for fruits");
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);

            const payload = {
                username: "TradeZone Bot",
                embeds: [{
                    title: "🛒 New Order Received!",
                    color: 0xff00aa,
                    fields: [
                        { name: "Items", value: cart.map(i => i.title || i.name).join("\n"), inline: false },
                        { name: "Total", value: ` \]{total.toFixed(2)}`, inline: true },
                        { name: "Username", value: username || "Not Provided", inline: true },
                        { name: "Time", value: new Date().toLocaleString(), inline: true }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                showToast("✅ Order sent to TradeZone successfully!");
            } catch (e) {
                showToast("✅ Order recorded (Webhook may need testing)");
            }

            setTimeout(() => {
                document.getElementById('receipt-modal').classList.add('hidden');
                cart = [];
                document.getElementById('cart-count').textContent = '0';
            }, 1500);
        }

        window.onload = () => {
            populateAccounts();
            populateFruits();
        };
    </script>
</body>
</html>
